# Claude Code Notification Settings
#
# MODE: sound | banner | both
MODE=sound
#
# SOUND: macOS system sound name
# Options: Ping, Glass, Blow, Pop, Hero, Purr, Sosumi, Submarine, Tink
SOUND=Ping
#
# DEBOUNCE: seconds to wait after last Stop event before notifying.
# Each intermediate stop resets the timer, so only the final stop triggers.
DEBOUNCE=3
#
# ONLY_WHEN_UNFOCUSED: skip notification if terminal is focused (default: true)
# Detects: Terminal, iTerm2, Alacritty, kitty, WezTerm, Hyper, Warp, Ghostty
ONLY_WHEN_UNFOCUSED=true
